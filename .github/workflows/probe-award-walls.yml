name: probe-award-walls

# Throwaway recon (workflow_dispatch only): runs probe_award_walls.py in headful Chrome under
# xvfb on the GitHub Actions (Azure) IP to see which candidate award-search airlines a real
# browser reaches clean vs. which escalate to a CAPTCHA / Access-Denied / queue wall. Writes
# nothing to the DB; prints a per-airline verdict and uploads screenshots as an artifact.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install nodriver==0.50.3
      - name: Probe award walls (headful Chrome under xvfb, Azure IP)
        run: xvfb-run -a python probe_award_walls.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: award-wall-screenshots
          path: shot_*.png
          if-no-files-found: ignore
